capability_closure_audit:
  reviewed_at: '2026-04-18'
  open_clusters:
  - cluster_id: agent-adapter-verified-host-ingress
    title: Agent Adapter 真实接入与宿主验证
    closure_state: partial
    summary: 010/094/121/122 已冻结 target selection、acknowledgement 边界与 verified ingress
      truth；当前 `adapter status` 已以 `env:OPENAI_CODEX` 给出 Codex host ingress 的 machine-verifiable
      `verified_loaded` 证据。仓库级 `run --dry-run` 现已在当前 close checkpoint 上输出阶段进度与结论，
      因此 operator-facing startup observability 已不再是该 cluster 的当前阻断项。该 cluster 继续保留为
      `partial` 的唯一剩余原因，是 canonical content 已被宿主实际消费仍缺独立证明，而不是“完全没有 verified host
      ingress runtime”。
    source_refs:
    - '010'
    - 094
    - 120-122
    - 158-160
  - cluster_id: project-meta-foundations
    title: 项目元能力基线
    closure_state: formal_only
    summary: 005-008 仍是 formal baseline；仓库尚未提供对应 runtime / guard / surface 的实现闭环。
    source_refs:
    - 005-008
