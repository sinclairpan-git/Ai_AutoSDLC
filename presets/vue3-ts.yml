# Vue 3 + TypeScript 技术栈预设
# 规范参考：Vue Official Style Guide + Airbnb JavaScript Style Guide
# 适用场景：企业中后台、H5 应用、SPA

id: vue3-ts
name: "Vue 3 + TypeScript"
tags: [frontend, spa, h5, enterprise]

stack:
  language: TypeScript
  language_version: "5.x"
  framework: "Vue 3 (Composition API)"
  build_tool: "Vite"
  state_management: "Pinia"
  router: "Vue Router 4"
  http_client: "Axios"
  ui_framework: "Element Plus 或 Ant Design Vue（可选）"
  testing:
    unit: "Vitest"
    component: "Vue Test Utils + @testing-library/vue"
    e2e: "Playwright（可选）"
  linting: "ESLint + @antfu/eslint-config"
  formatting: "Prettier"
  css: "UnoCSS 或 TailwindCSS 或 scoped CSS"

conventions:
  naming:
    component_file: "PascalCase.vue（UserProfile.vue）"
    composable: "use 前缀（useUserStore.ts, useAuth.ts）"
    type_file: "camelCase.ts（userTypes.ts）"
    constant: "UPPER_SNAKE_CASE"
    css_class: "kebab-case（BEM 可选）"
    route_path: "kebab-case（/user-profile）"
    event: "kebab-case（@update-value）"
    prop: "camelCase 定义，kebab-case 使用"

  code_style:
    max_line_length: 100
    indent: "2 spaces"
    quotes: "single quotes"
    semicolons: false                # Vue 社区主流
    trailing_comma: "es5"
    component_api: "Composition API + <script setup>（禁止 Options API）"
    type_annotation: "Props/Emits/Expose 必须用 TypeScript 类型标注"

  mandatory_rules:
    - "使用 <script setup lang=\"ts\"> 语法"
    - "Props 必须用 defineProps<T>() 定义类型，禁止运行时 props 声明"
    - "Emits 必须用 defineEmits<T>() 定义类型"
    - "响应式数据用 ref() / reactive()，禁止直接修改 props"
    - "组件模板 <= 100 行，超出则拆分子组件"
    - "v-for 必须有 :key"
    - "v-if 和 v-for 不在同一元素上使用"
    - "API 请求封装在 services/ 或 api/ 层，组件不直接调用 axios"
    - "路由守卫逻辑集中在 router/guards.ts"
    - "全局状态用 Pinia store，组件间通信优先 props/emits，其次 provide/inject"

  project_structure:
    - "src/"
    - "src/main.ts          入口"
    - "src/App.vue           根组件"
    - "src/views/            页面组件"
    - "src/components/       通用组件"
    - "src/composables/      组合式函数（use*.ts）"
    - "src/stores/           Pinia 状态管理"
    - "src/api/              API 请求封装"
    - "src/router/           路由配置"
    - "src/types/            TypeScript 类型定义"
    - "src/utils/            工具函数"
    - "src/assets/           静态资源"

  reference_standards:
    - "Vue Style Guide (Priority A+B): https://vuejs.org/style-guide/"
    - "Airbnb JavaScript Style Guide: https://github.com/airbnb/javascript"
    - "TypeScript Handbook: https://www.typescriptlang.org/docs/handbook/"
