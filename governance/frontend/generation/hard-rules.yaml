rules:
- rule_id: no-direct-props-mutation
  category: absolute
  description: direct prop mutation is forbidden
- rule_id: no-default-sf-components
  category: absolute
  description: sf components cannot be the default generation entry
- rule_id: no-kernel-protocol-overwrite
  category: absolute
  description: page implementation cannot overwrite kernel protocol
- rule_id: no-new-legacy-dependencies
  category: absolute
  description: new code cannot introduce fresh legacy dependencies
- rule_id: whitelist-extension-by-exception
  category: controlled_exception
  description: whitelist extension requires structured exception
- rule_id: token-layout-exception
  category: controlled_exception
  description: token or layout deviation requires structured exception
- rule_id: primevue-theme-token-first
  category: absolute
  description: PrimeVue component visuals must be governed by definePreset theme tokens
    before business CSS overrides
- rule_id: no-global-primevue-base-selector-rewrite
  category: absolute
  description: global rewrites of PrimeVue base selectors such as .p-button, .p-inputtext,
    .p-select, .p-inputtextarea, .p-tag, .p-card, or .p-dialog are forbidden
- rule_id: unocss-first-page-layout
  category: absolute
  description: page layout and spacing must prefer UnoCSS utilities and CSS variables
    over scattered local CSS
- rule_id: base-components-before-business-usage
  category: absolute
  description: business pages must consume PrimeVue through Base components or the governed
    provider adapter before feature-specific wrappers
- rule_id: visual-family-consistency
  category: absolute
  description: >-
    navigation, page headers, badges, buttons, tags, cards, and filters must share the
    same PrimeVue token family and #1770e6 semantic highlight
- rule_id: no-native-form-control-mixing
  category: absolute
  description: native select or form controls cannot be mixed beside PrimeVue inputs
    in the same filter or form surface
- rule_id: visible-chinese-dev-i18n-wrapper
  category: absolute
  description: new visible Simplified Chinese UI copy must use $i('中文') during development
    unless the file already follows a stable i18n key system
- rule_id: semantic-tag-severity-mapping
  category: controlled_exception
  description: status, risk, and visibility labels must use governed semantic mapping
    instead of page-local raw severity shortcuts
- rule_id: theme-semantic-token-completeness
  category: absolute
  description: PrimeVue definePreset themes must define primary, surface, and highlight
    semantics instead of leaving visual family alignment to page CSS
- rule_id: theme-entry-single-source
  category: absolute
  description: src/theme.ts is the single PrimeVue preset entry; main.ts, page styles,
    and business components cannot recreate theme configuration
- rule_id: path-level-directory-contract
  category: absolute
  description: Vue3 generation must emit concrete path-level structure, use src/pages
    for new projects, avoid simultaneous pages/views roots, and include api, i18n,
    styles, theme, transform, types, router, stores, and component layer boundaries
- rule_id: normative-advisory-landed-output-boundary
  category: absolute
  description: AI output must clearly separate normative rules, optional recommendations,
    and already landed project facts
- rule_id: ordinary-css-exception-boundary
  category: absolute
  description: ordinary CSS is limited to special animations, complex structures, small
    shell supplements, and third-party exceptions; it cannot become a broad PrimeVue
    base visual rewrite layer
- rule_id: scoped-frontend-engineering-boundary
  category: absolute
  description: frontend lint, format, commit, and hook constraints must be scoped to
    the confirmed frontend subproject instead of being silently expanded to the host
    repository
- rule_id: base-layer-permission-control
  category: absolute
  description: Base components must carry shared permission, disabled, loading, and
    i18n access patterns for high-frequency controls
- rule_id: router-meta-contract
  category: absolute
  description: Vue Router modules must use governed meta fields such as title, auth,
    keepAlive, and roles for generated routes
- rule_id: shared-api-response-contract
  category: absolute
  description: generated API layers must route common request and response types through
    api/types.ts or types/ with a reusable generic response envelope when the backend
    contract wraps responses
- rule_id: typescript-strict-unknown-first
  category: absolute
  description: generated TypeScript must assume strict mode and prefer unknown with
    boundary narrowing over any as a business-type fallback
- rule_id: dark-information-block-boundary
  category: absolute
  description: dark high-contrast blocks are reserved for code, output, preview, or
    reading surfaces and must not be used as ordinary cards, filters, navigation, or
    routine information groups
- rule_id: light-surface-information-carrier-consistency
  category: absolute
  description: ordinary information carriers in light pages must remain in the same
    visual family as the page body instead of introducing a separate card, panel,
    filter, or badge visual system
- rule_id: commit-granularity-readability
  category: controlled_exception
  description: frontend changes must keep formatting noise separate from business changes
    and use commit messages that expose the true intent within the configured commitlint
    contract
