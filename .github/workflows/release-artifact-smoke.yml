name: Release Artifact Smoke

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to verify.
        required: true
        default: v0.7.8
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: release-artifact-smoke-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: true

jobs:
  windows-zip:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
      GH_TOKEN: ${{ github.token }}
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout repository truth
        uses: actions/checkout@v6

      - name: Download release zip asset
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $assetDir = Join-Path $env:RUNNER_TEMP "ai-sdlc-release-assets"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null
          gh release download $env:RELEASE_TAG --pattern "ai-sdlc-offline-*-windows-*.zip" --dir $assetDir --repo $env:GITHUB_REPOSITORY

      - name: Install release zip and run CLI smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $utf8 = [System.Text.UTF8Encoding]::new($false)
          [Console]::InputEncoding = $utf8
          [Console]::OutputEncoding = $utf8
          $OutputEncoding = $utf8

          $assetDir = Join-Path $env:RUNNER_TEMP "ai-sdlc-release-assets"
          $smokeRoot = Join-Path $env:RUNNER_TEMP "ai-sdlc-release-zip-smoke"
          $evidenceRoot = Join-Path $env:RUNNER_TEMP "ai-sdlc-release-zip-evidence"
          Remove-Item -Recurse -Force $smokeRoot, $evidenceRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $smokeRoot, $evidenceRoot | Out-Null

          $archive = Get-ChildItem -Path $assetDir -Filter "ai-sdlc-offline-*-windows-*.zip" -File | Select-Object -First 1
          if (-not $archive) {
            throw "Expected release zip asset was not downloaded."
          }

          Expand-Archive -LiteralPath $archive.FullName -DestinationPath $smokeRoot -Force
          $bundleDir = Get-ChildItem -Path $smokeRoot -Directory | Select-Object -First 1
          if (-not $bundleDir) {
            throw "Expanded release zip did not contain a bundle directory."
          }

          $digest = (Get-FileHash -Algorithm SHA256 "AGENTS.md").Hash.ToLowerInvariant()
          $env:OPENAI_CODEX = "1"
          $env:AI_SDLC_ADAPTER_CANONICAL_SHA256 = "sha256:$digest"

          Push-Location $bundleDir.FullName
          & .\install_offline.ps1 *>&1 | Tee-Object -FilePath (Join-Path $evidenceRoot "install.log")
          if ($LASTEXITCODE -ne 0) {
            throw "release install_offline.ps1 failed with exit code $LASTEXITCODE"
          }
          Pop-Location

          $cliExe = Join-Path $bundleDir.FullName ".venv\Scripts\ai-sdlc.exe"
          & $cliExe --help *>&1 | Tee-Object -FilePath (Join-Path $evidenceRoot "help.txt")
          if ($LASTEXITCODE -ne 0) {
            throw "release ai-sdlc --help failed with exit code $LASTEXITCODE"
          }

          Push-Location $env:GITHUB_WORKSPACE
          & $cliExe adapter status *>&1 | Tee-Object -FilePath (Join-Path $evidenceRoot "adapter-status.txt")
          if ($LASTEXITCODE -ne 0) {
            throw "release ai-sdlc adapter status failed with exit code $LASTEXITCODE"
          }
          & $cliExe run --dry-run *>&1 | Tee-Object -FilePath (Join-Path $evidenceRoot "run-dry-run.txt")
          if ($LASTEXITCODE -ne 0) {
            throw "release ai-sdlc run --dry-run failed with exit code $LASTEXITCODE"
          }
          Pop-Location

          Copy-Item -LiteralPath (Join-Path $bundleDir.FullName "bundle-manifest.json") -Destination $evidenceRoot

      - name: Upload release zip smoke evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-zip-smoke-evidence
          path: ${{ runner.temp }}/ai-sdlc-release-zip-evidence
          if-no-files-found: error

  posix-tar:
    name: ${{ matrix.asset_os }} tar.gz
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_os: macos
            runner: macos-latest
          - asset_os: linux
            runner: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
      RELEASE_ASSET_OS: ${{ matrix.asset_os }}
      GH_TOKEN: ${{ github.token }}
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout repository truth
        uses: actions/checkout@v6

      - name: Download release tar asset
        shell: bash
        run: |
          set -euo pipefail
          asset_dir="${RUNNER_TEMP}/ai-sdlc-release-assets"
          mkdir -p "${asset_dir}"
          gh release download "${RELEASE_TAG}" --pattern "ai-sdlc-offline-*-${RELEASE_ASSET_OS}-*.tar.gz" --dir "${asset_dir}" --repo "${GITHUB_REPOSITORY}"

      - name: Install release tar and run CLI smoke
        shell: bash
        run: |
          set -euo pipefail
          asset_dir="${RUNNER_TEMP}/ai-sdlc-release-assets"
          smoke_root="${RUNNER_TEMP}/ai-sdlc-release-tar-smoke"
          evidence_root="${RUNNER_TEMP}/ai-sdlc-release-tar-evidence"
          rm -rf "${smoke_root}" "${evidence_root}"
          mkdir -p "${smoke_root}" "${evidence_root}"

          archive="$(find "${asset_dir}" -maxdepth 1 -name "ai-sdlc-offline-*-${RELEASE_ASSET_OS}-*.tar.gz" -type f | head -n 1)"
          if [[ -z "${archive}" ]]; then
            echo "Expected ${RELEASE_ASSET_OS} release tar asset was not downloaded." >&2
            exit 1
          fi

          tar xzf "${archive}" -C "${smoke_root}"
          bundle_dir="$(find "${smoke_root}" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          if [[ -z "${bundle_dir}" ]]; then
            echo "Expanded release tar did not contain a bundle directory." >&2
            exit 1
          fi

          digest="$(python - <<'PY'
          from pathlib import Path
          import hashlib
          print(hashlib.sha256(Path("AGENTS.md").read_bytes()).hexdigest())
          PY
          )"
          export OPENAI_CODEX=1
          export AI_SDLC_ADAPTER_CANONICAL_SHA256="sha256:${digest}"

          (
            cd "${bundle_dir}"
            ./install_offline.sh 2>&1 | tee "${evidence_root}/install.log"
          )

          cli="${bundle_dir}/.venv/bin/ai-sdlc"
          "${cli}" --help 2>&1 | tee "${evidence_root}/help.txt"
          "${cli}" adapter status 2>&1 | tee "${evidence_root}/adapter-status.txt"
          "${cli}" run --dry-run 2>&1 | tee "${evidence_root}/run-dry-run.txt"
          cp "${bundle_dir}/bundle-manifest.json" "${evidence_root}/"

      - name: Upload release tar smoke evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.asset_os }}-tar-smoke-evidence
          path: ${{ runner.temp }}/ai-sdlc-release-tar-evidence
          if-no-files-found: error
