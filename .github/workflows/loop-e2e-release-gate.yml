name: Loop E2E Release Gate

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/loop-e2e-release-gate.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "scripts/loop_e2e_release_gate.py"
      - "scripts/frontend_browser_gate_probe_runner.mjs"
      - "src/**"

permissions:
  contents: read

jobs:
  loop-e2e:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run Loop Engine clean-project E2E
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $utf8 = [System.Text.UTF8Encoding]::new($false)
          [Console]::InputEncoding = $utf8
          [Console]::OutputEncoding = $utf8
          $OutputEncoding = $utf8
          $safeOs = "${{ matrix.os }}".Replace("-", "_")
          $evidenceRoot = Join-Path $env:RUNNER_TEMP "loop-e2e-release-gate-$safeOs"
          Remove-Item -Recurse -Force $evidenceRoot -ErrorAction SilentlyContinue
          $scriptArgs = @("scripts/loop_e2e_release_gate.py", "--evidence-root", $evidenceRoot)
          if ("${{ matrix.os }}" -eq "windows-latest") {
            $scriptArgs += "--include-windows-playwright-provider-e2e"
          }
          uv run python @scriptArgs

      - name: Upload Loop E2E evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: loop-e2e-release-gate-${{ matrix.os }}
          path: ${{ runner.temp }}/loop-e2e-release-gate-*
          if-no-files-found: error
