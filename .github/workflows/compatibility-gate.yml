name: Compatibility Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  COLUMNS: "200"
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8

concurrency:
  group: compatibility-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cross-platform-validation:
    name: Cross Platform Validation (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync --locked

      - name: Doctor
        run: uv run ai-sdlc doctor

      - name: Pytest
        run: uv run pytest -vv

  windows-shell-smoke:
    name: Windows Shell Smoke (${{ matrix.shell }})
    runs-on: windows-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        shell:
          - pwsh
          - cmd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Shell smoke (pwsh)
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          python -m pip install uv
          uv sync --locked
          uv run ai-sdlc doctor

      - name: Shell smoke (cmd)
        if: matrix.shell == 'cmd'
        shell: cmd
        run: |
          python -m pip install uv || exit /b %ERRORLEVEL%
          uv sync --locked || exit /b %ERRORLEVEL%
          uv run ai-sdlc doctor || exit /b %ERRORLEVEL%

  compatibility-gate-result:
    name: Compatibility Gate Result
    runs-on: ubuntu-latest
    needs:
      - cross-platform-validation
      - windows-shell-smoke
    if: always()

    steps:
      - name: Check compatibility gate inputs
        run: |
          echo "cross-platform-validation: ${{ needs.cross-platform-validation.result }}"
          echo "windows-shell-smoke: ${{ needs.windows-shell-smoke.result }}"

          if [ "${{ needs.cross-platform-validation.result }}" != "success" ]; then
            echo "cross-platform-validation did not succeed."
            exit 1
          fi

          if [ "${{ needs.windows-shell-smoke.result }}" != "success" ]; then
            echo "windows-shell-smoke did not succeed."
            exit 1
          fi

          echo "Compatibility gate inputs succeeded."
