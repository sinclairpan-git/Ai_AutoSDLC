name: Cross Platform Core

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/cross-platform-core.yml"
      - "pyproject.toml"
      - "src/**"
      - "tests/**"

permissions:
  contents: read

jobs:
  core-smoke:
    concurrency:
      group: cross-platform-core-${{ github.event.pull_request.number || github.ref }}-${{ matrix.os }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Doctor
        run: uv run ai-sdlc doctor

      - name: Pytest smoke
        run: uv run pytest tests/integration/test_cli_module_invocation.py tests/integration/test_cli_handoff.py -q
