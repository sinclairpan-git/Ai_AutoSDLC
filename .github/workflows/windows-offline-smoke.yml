name: Windows Offline Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/windows-offline-smoke.yml"
      - ".github/workflows/pr-checks.yml"
      - "AGENTS.md"
      - "pyproject.toml"
      - "README.md"
      - "packaging/**"
      - "src/**"
      - "tests/integration/test_github_workflows.py"
      - "tests/integration/test_offline_bundle_scripts.py"

permissions:
  contents: read

concurrency:
  group: windows-offline-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build Windows offline bundle
        shell: bash
        run: |
          set -euo pipefail
          uv python install 3.11
          runtime_python="$(uv python find --managed-python 3.11)"
          runtime_python="$(cygpath -u "$runtime_python")"
          runtime_root="$(dirname "$runtime_python")"
          PYTHON="$runtime_python" \
            PYTHONUTF8="1" \
            PYTHONIOENCODING="utf-8" \
            AI_SDLC_OFFLINE_PYTHON_RUNTIME="$runtime_root" \
            bash packaging/offline/build_offline_bundle.sh

      - name: Install bundle and run CLI smoke
        shell: pwsh
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: utf-8
        run: |
          $ErrorActionPreference = "Stop"
          $utf8 = [System.Text.UTF8Encoding]::new($false)
          [Console]::InputEncoding = $utf8
          [Console]::OutputEncoding = $utf8
          $OutputEncoding = $utf8
          $archive = Get-ChildItem -Path "dist-offline" -Filter "ai-sdlc-offline-*.zip" -File | Select-Object -First 1
          if (-not $archive) {
            throw "Expected dist-offline zip archive was not produced."
          }

          $smokeRoot = Join-Path $env:RUNNER_TEMP "ai-sdlc-windows-smoke"
          $evidenceRoot = Join-Path $env:RUNNER_TEMP "ai-sdlc-windows-smoke-evidence"
          Remove-Item -Recurse -Force $smokeRoot, $evidenceRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $smokeRoot, $evidenceRoot | Out-Null

          Expand-Archive -LiteralPath $archive.FullName -DestinationPath $smokeRoot -Force
          $bundleDir = Get-ChildItem -Path $smokeRoot -Directory | Select-Object -First 1
          if (-not $bundleDir) {
            throw "Expanded archive did not contain a bundle directory."
          }

          $digest = (Get-FileHash -Algorithm SHA256 "AGENTS.md").Hash.ToLowerInvariant()
          $env:OPENAI_CODEX = "1"
          $env:AI_SDLC_ADAPTER_CANONICAL_SHA256 = "sha256:$digest"
          $windowsPowerShell = Join-Path $env:SystemRoot "System32\WindowsPowerShell\v1.0\powershell.exe"
          if (-not (Test-Path $windowsPowerShell)) {
            throw "Expected Windows PowerShell 5.1 at $windowsPowerShell"
          }

          $installLog = Join-Path $evidenceRoot "install.log"
          $helpLog = Join-Path $evidenceRoot "help.txt"
          $statusLog = Join-Path $evidenceRoot "adapter-status.txt"
          $dryRunLog = Join-Path $evidenceRoot "run-dry-run.txt"

          Push-Location $bundleDir.FullName
          & $windowsPowerShell -NoProfile -ExecutionPolicy Bypass -File .\install_offline.ps1 -AddToPath *>&1 | Tee-Object -FilePath $installLog
          if ($LASTEXITCODE -ne 0) {
            throw "Windows PowerShell install_offline.ps1 failed with exit code $LASTEXITCODE"
          }
          Pop-Location

          python packaging/offline/verify_offline_bundle.py $bundleDir.FullName `
            --require-bundled-runtime `
            --install-log $installLog
          if ($LASTEXITCODE -ne 0) {
            throw "verify_offline_bundle.py failed with exit code $LASTEXITCODE"
          }

          $cliDir = Join-Path $bundleDir.FullName ".venv\Scripts"
          $env:Path = $cliDir + [IO.Path]::PathSeparator + $env:Path
          if (-not (Get-Command ai-sdlc -ErrorAction SilentlyContinue)) {
            throw "Expected ai-sdlc to resolve on PATH after -AddToPath install."
          }

          ai-sdlc --help *>&1 | Tee-Object -FilePath $helpLog
          if ($LASTEXITCODE -ne 0) {
            throw "ai-sdlc --help failed with exit code $LASTEXITCODE"
          }

          Push-Location $env:GITHUB_WORKSPACE
          if (-not (Test-Path "AGENTS.md")) {
            throw "Expected AGENTS.md in GITHUB_WORKSPACE before adapter verification."
          }
          if (-not (Test-Path ".ai-sdlc")) {
            throw "Expected .ai-sdlc directory in GITHUB_WORKSPACE before dry-run."
          }

          ai-sdlc adapter status *>&1 | Tee-Object -FilePath $statusLog
          if ($LASTEXITCODE -ne 0) {
            throw "ai-sdlc adapter status failed with exit code $LASTEXITCODE"
          }

          ai-sdlc run --dry-run *>&1 | Tee-Object -FilePath $dryRunLog
          $dryRunExit = $LASTEXITCODE
          if ($dryRunExit -ne 0) {
            $dryRunOutput = Get-Content -LiteralPath $dryRunLog -Raw
            $knownRepoStateStop = (
              ($dryRunOutput -match "Legacy Artifact Probe") -and
              ($dryRunOutput -match "recover --reconcile")
            )
            if (-not $knownRepoStateStop) {
              throw "ai-sdlc run --dry-run failed with exit code $dryRunExit"
            }
            Write-Host "ai-sdlc run --dry-run reported repo-state reconciliation diagnostics; treating this as smoke pass."
            $global:LASTEXITCODE = 0
          }
          Pop-Location

          Copy-Item -LiteralPath (Join-Path $bundleDir.FullName "bundle-manifest.json") -Destination $evidenceRoot

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v7
      with:
        name: windows-offline-smoke-evidence
        path: ${{ runner.temp }}/ai-sdlc-windows-smoke-evidence
        if-no-files-found: error

  user-guide-e2e:
    name: Windows User Guide E2E
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Execute Windows user-guide install flows
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $utf8 = [System.Text.UTF8Encoding]::new($false)
          [Console]::InputEncoding = $utf8
          [Console]::OutputEncoding = $utf8
          $OutputEncoding = $utf8
          $env:OPENAI_CODEX = "1"

          $evidenceRoot = Join-Path $env:RUNNER_TEMP "ai-sdlc-windows-user-guide-e2e"
          Remove-Item -Recurse -Force $evidenceRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $evidenceRoot | Out-Null
          $summaryPath = Join-Path $evidenceRoot "summary.txt"
          $failures = New-Object System.Collections.Generic.List[string]

          function Add-Summary([string] $Message) {
            Add-Content -LiteralPath $summaryPath -Encoding utf8 -Value $Message
            Write-Host $Message
          }

          function Add-Failure([string] $Message) {
            $failures.Add($Message)
            Add-Summary "FAIL: $Message"
          }

          function Assert-Contains([string] $Path, [string] $Needle, [string] $Label) {
            $content = Get-Content -LiteralPath $Path -Raw -Encoding utf8
            if (-not $content.Contains($Needle)) {
              Add-Failure "$Label missing expected text: $Needle"
            } else {
              Add-Summary "PASS: $Label contains: $Needle"
            }
          }

          function Assert-NotContains([string] $Path, [string] $Needle, [string] $Label) {
            $content = Get-Content -LiteralPath $Path -Raw -Encoding utf8
            if ($content.Contains($Needle)) {
              Add-Failure "$Label contains unexpected text: $Needle"
            } else {
              Add-Summary "PASS: $Label does not contain: $Needle"
            }
          }

          function Invoke-ManualScript([string] $ScriptPath, [string] $LogPath, [string] $Label) {
            Add-Summary "RUN: $Label"
            $windowsPowerShell = Join-Path $env:SystemRoot "System32\WindowsPowerShell\v1.0\powershell.exe"
            & $windowsPowerShell -NoProfile -ExecutionPolicy Bypass -File $ScriptPath *>&1 |
              Tee-Object -FilePath $LogPath
            $exitCode = $LASTEXITCODE
            if ($exitCode -ne 0) {
              Add-Failure "$Label exited with code $exitCode"
            } else {
              Add-Summary "PASS: $Label exited with code 0"
            }
          }

          function Write-ManualScript([string] $Path, [string] $Content) {
            Set-Content -LiteralPath $Path -Encoding utf8 -Value $Content
          }

          function Run-Flow([string] $Mode) {
            Add-Summary "=== $Mode ==="
            Remove-Item -Recurse -Force "D:\work" -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Force -Path "D:\work" | Out-Null

            $createProjectScript = Join-Path $evidenceRoot "$Mode-01-create-project.ps1"
            Write-ManualScript $createProjectScript @'
          # D:\work 是示例父目录，ui-test-platform 是示例项目名；可按需替换
          cd D:\work
          mkdir ui-test-platform
          cd ui-test-platform
          '@
            Invoke-ManualScript $createProjectScript (Join-Path $evidenceRoot "$Mode-01-create-project.log") "$Mode create project command block"

            if ($Mode -eq "predownloaded-package") {
              Invoke-WebRequest -Uri "https://github.com/sinclairpan-git/Ai_AutoSDLC/releases/download/v0.8.0/ai-sdlc-offline-0.8.0-windows-amd64.zip" -OutFile "D:\work\ai-sdlc-offline-0.8.0-windows-amd64.zip"
              Set-Location "D:\work"
              $installScript = Join-Path $evidenceRoot "$Mode-02-install.ps1"
              Write-ManualScript $installScript @'
          # 当前假设你已经 cd 到 zip 所在目录；脚本只检查当前目录，不扫描其他目录
          # This assumes you have cd'ed into the directory containing the zip. The script checks only the current directory.
          $PackageName = "ai-sdlc-offline-0.8.0-windows-amd64.zip"
          $BundleName = "ai-sdlc-offline-0.8.0-windows-amd64"
          $PackageDir = (Get-Location).Path
          $ExtractRoot = Join-Path $PackageDir ".ai-sdlc-install"
          $Zip = Get-ChildItem -LiteralPath . -Filter $PackageName -File | Select-Object -First 1
          if (-not $Zip) {
            Write-Host "当前目录没有找到安装包：$PackageDir\$PackageName"
            Write-Host "Package not found in the current directory: $PackageDir\$PackageName"
            throw "请把 zip 放到当前目录，并先 cd 到该目录后重试。Place the zip in the current directory, cd into that directory, then retry."
          }
          New-Item -ItemType Directory -Path $ExtractRoot -Force | Out-Null
          Write-Host "正在解压安装包；如果已经解压过，会安静覆盖同名文件。"
          Write-Host "Extracting package; existing installer files will be overwritten quietly."
          Expand-Archive -LiteralPath $Zip.FullName -DestinationPath $ExtractRoot -Force
          Set-Location (Join-Path $ExtractRoot $BundleName)
          powershell -ExecutionPolicy Bypass -File .\install_offline.ps1 -AddToPath
          .\.venv\Scripts\python.exe -m ai_sdlc --help
          '@
              Invoke-ManualScript $installScript (Join-Path $evidenceRoot "$Mode-02-install.log") "$Mode install command block"
            } else {
              Set-Location "D:\work\ui-test-platform"
              $installScript = Join-Path $evidenceRoot "$Mode-02-install.ps1"
              Write-ManualScript $installScript @'
          # 回到项目父目录，让安装包目录和业务项目目录同级
          cd ..
          $BundleName = "ai-sdlc-offline-0.8.0-windows-amd64"
          $PackageName = "$BundleName.zip"
          $PackageDir = (Get-Location).Path
          $ExtractRoot = Join-Path $PackageDir ".ai-sdlc-install"
          Invoke-WebRequest -Uri "https://github.com/sinclairpan-git/Ai_AutoSDLC/releases/download/v0.8.0/$PackageName" -OutFile (Join-Path $PackageDir $PackageName)
          New-Item -ItemType Directory -Path $ExtractRoot -Force | Out-Null
          Write-Host "正在解压安装包；如果已经解压过，会安静覆盖同名文件。"
          Write-Host "Extracting package; existing installer files will be overwritten quietly."
          Expand-Archive -LiteralPath (Join-Path $PackageDir $PackageName) -DestinationPath $ExtractRoot -Force
          Set-Location (Join-Path $ExtractRoot $BundleName)
          powershell -ExecutionPolicy Bypass -File .\install_offline.ps1 -AddToPath
          .\.venv\Scripts\python.exe -m ai_sdlc --help
          '@
              Invoke-ManualScript $installScript (Join-Path $evidenceRoot "$Mode-02-install.log") "$Mode install command block"
            }

            $initScript = Join-Path $evidenceRoot "$Mode-03-init.ps1"
            Write-ManualScript $initScript @'
          # D:\work\ui-test-platform 是示例路径；请替换成你的真实项目根目录
          cd D:\work\ui-test-platform
          & "D:\work\.ai-sdlc-install\ai-sdlc-offline-0.8.0-windows-amd64\.venv\Scripts\ai-sdlc.exe" init .
          '@
            Invoke-ManualScript $initScript (Join-Path $evidenceRoot "$Mode-03-init.log") "$Mode init command block"

            $installLog = Join-Path $evidenceRoot "$Mode-02-install.log"
            $initLog = Join-Path $evidenceRoot "$Mode-03-init.log"
            Assert-Contains $installLog "正在解压安装包" "$Mode install bilingual zh"
            Assert-Contains $installLog "Extracting package" "$Mode install bilingual en"
            Assert-Contains $installLog "Result" "$Mode install result heading"
            Assert-Contains $installLog "Next" "$Mode install next heading"
            Assert-Contains $installLog "Offline installation completed" "$Mode install success"
            Assert-Contains $installLog "Usage" "$Mode help usage"
            Assert-Contains $installLog "Commands" "$Mode help commands"
            Assert-Contains $installLog "init" "$Mode help init command"
            Assert-Contains $installLog "adapter" "$Mode help adapter command"
            Assert-Contains $installLog "run" "$Mode help run command"
            Assert-Contains $installLog "self-update" "$Mode help self-update command"
            Assert-Contains $initLog "Initialized AI-SDLC project" "$Mode init initialized"
            Assert-Contains $initLog "当前结果 / Result" "$Mode init bilingual result"
            Assert-Contains $initLog "下一步 / Next" "$Mode init bilingual next"
            Assert-Contains $initLog "AI 对话" "$Mode init AI chat next step"
            Assert-Contains $initLog "需求" "$Mode init requirement next step"
            Assert-NotContains $installLog "Traceback" "$Mode install no traceback"
            Assert-NotContains $initLog "Traceback" "$Mode init no traceback"
          }

          $guide = Get-Content -LiteralPath "USER_GUIDE.zh-CN.md" -Raw -Encoding utf8
          foreach ($needle in @(
            '当前正式发布版：`v0.8.0`',
            'ai-sdlc-offline-0.8.0-windows-amd64.zip',
            'https://github.com/sinclairpan-git/Ai_AutoSDLC/releases/tag/v0.8.0',
            '当前结果 / Result',
            '下一步 / Next',
            '切换到 AI 对话'
          )) {
            if (-not $guide.Contains($needle)) {
              Add-Failure "USER_GUIDE.zh-CN.md missing expected v0.8.0/manual text: $needle"
            } else {
              Add-Summary "PASS: USER_GUIDE contains: $needle"
            }
          }
          if ($guide.Contains("ai-sdlc-offline-0.7.19-windows-amd64.zip")) {
            Add-Failure "USER_GUIDE.zh-CN.md still references the old Windows v0.7.19 package"
          } else {
            Add-Summary "PASS: USER_GUIDE has no old Windows v0.7.19 package reference"
          }

          Run-Flow "predownloaded-package"
          Run-Flow "online-release-download"

          if ($failures.Count -gt 0) {
            Add-Summary "TOTAL FAILURES: $($failures.Count)"
            foreach ($failure in $failures) {
              Add-Summary " - $failure"
            }
            exit 1
          }
          Add-Summary "TOTAL FAILURES: 0"

      - name: Upload Windows user-guide E2E evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-user-guide-e2e-evidence
          path: ${{ runner.temp }}/ai-sdlc-windows-user-guide-e2e
          if-no-files-found: error
