name: PR Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev --locked

      - name: Ruff
        run: uv run ruff check src tests

      - name: Pytest smoke
        run: >-
          uv run pytest
          tests/unit/test_command_names.py
          tests/unit/test_workitem_scaffold.py
          tests/unit/test_packaging_config.py
          tests/integration/test_cli_init.py
          tests/integration/test_cli_program.py
          tests/integration/test_cli_workitem_init.py
          -q

      - name: Verify constraints
        run: uv run ai-sdlc verify constraints
