              output = "".join(chunks)
              (evidence / f"{name}.txt").write_text(output, encoding="utf-8")
              return (None if alive else proc.exitstatus), output, sent_yes

          before = package_version("version-before")
          doctor_exit, doctor_output, doctor_sent_yes = run_pty("ai-sdlc doctor", "ordinary-cli-doctor-pty")
          after_doctor = package_version("version-after-ordinary-cli")
          check_exit, check_output = run_text(["ai-sdlc", "self-update", "check"], "self-update-check-bare-nonpty")
          after_check = package_version("version-after-self-update-check-bare")
