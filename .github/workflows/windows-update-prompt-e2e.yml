              module_check_exit, module_check_output = run_text([sys.executable, "-m", "ai_sdlc", "self-update", "check"], "self-update-check-module-nonpty")
              module_after_check = package_version("version-after-self-update-check-module")

          result = {
              "scenario": "auto-capable",
              "old_version": old_version,
              "latest_version": latest_version,
              "before_version": before,
              "ordinary_cli_exit": doctor_exit,
              "ordinary_cli_update_prompt_detected": "是否升级" in doctor_output and "回复 y/n" in doctor_output,
              "ordinary_cli_sent_yes": doctor_sent_yes,
              "version_after_ordinary_cli": after_doctor,
              "ordinary_cli_updated_to_latest": after_doctor == latest_version,
              "self_update_check_exit": check_exit,
              "self_update_check_sent_yes": False,
              "version_after_self_update_check": after_check,
              "self_update_check_updated_to_latest": after_check == latest_version,
              "module_self_update_check_exit": module_check_exit,
              "version_after_module_self_update_check": module_after_check,
              "module_self_update_check_updated_to_latest": module_after_check == latest_version,
          }
          (evidence / "result.json").write_text(json.dumps(result, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps(result, ensure_ascii=False, indent=2))

          # This workflow records real behavior. Historical versions may fail the desired UX
          # contract; keep the job green so both scenario artifacts are always available.
          if not result["ordinary_cli_update_prompt_detected"] or not result["ordinary_cli_updated_to_latest"]:
              print("OBSERVED_GAP: ordinary CLI did not complete y/n prompted update")
          if not result["self_update_check_updated_to_latest"] and not result["module_self_update_check_updated_to_latest"]:
              print("OBSERVED_GAP: self-update check did not update to latest")
          '@ | Out-File -FilePath (Join-Path $evidenceRoot "run_update_prompt_e2e.py") -Encoding utf8

          $env:EVIDENCE_ROOT = $evidenceRoot
          & $python (Join-Path $evidenceRoot "run_update_prompt_e2e.py")

